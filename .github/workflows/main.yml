name: build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: "${{ matrix.SECCOMP == '1' && 'seccomp' || 'no-seccomp' }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        SECCOMP: [ 0, 1 ]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq clang-tools curl gdb lcov libtalloc-dev sloccount strace

      - name: Gather analytics
        run: sloccount --details .

      - name: Build elf loader and proot
        run: |
          make -C src loader.elf loader-m32.elf build.h
          env CFLAGS=--coverage LDFLAGS=--coverage make -C src proot V=1

      - name: Execute test suite
        continue-on-error: true
        timeout-minutes: 10
        run: |
          env ${{ matrix.SECCOMP == '0' && 'PROOT_NO_SECCOMP=1' || '' }} PATH=/bin:/usr/bin:/sbin:/usr/sbin:$PWD/src make -C tests -j $(nproc) QUIET_LOG=$PWD/test.log

      - name: Output test log
        if: always()
        continue-on-error: true
        run: ([ -f test.log ] && cat test.log) || true
